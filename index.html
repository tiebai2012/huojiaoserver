<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火教集团附属服务器</title>
    <meta name="description" content="火教集团附属服务器" />
    <link rel="icon" id="favicon" type="image/png" href="">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="" alt="Logo" class="server-logo" id="header-logo" />
                <span class="logo-text">火教集团附属服务器</span>
            </div>
            <nav class="nav" id="nav">
                <a href="#" data-page="home" class="active">首页</a>
                <a href="#" data-page="reward">奖励</a>
                <a href="#" data-page="notice">公告</a>
                <a href="#" data-page="media">媒体</a>
            </nav>
        </div>
    </header>

    <!-- 首页 -->
    <section class="page active" id="page-home">
        <div class="page-content">
            <h1>火教集团附属服务器</h1>
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-value" id="hero-players">--</span>
                    <span class="stat-label">在线玩家</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value" id="hero-ping">--</span>
                    <span class="stat-label">延迟 (ms)</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value">1.20.1</span>
                    <span class="stat-label">游戏版本</span>
                </div>
            </div>
            <div class="hero-status" id="hero-status">
                <span class="status-dot"></span>
                <span id="status-label">正在获取状态...</span>
            </div>
            <p class="server-internal-tip" id="server-internal-tip" style="display:block;">服务器只对内部开放</p>
            <div class="player-list" id="player-list">
                <h3 class="player-list-title">在线玩家列表</h3>
                <div class="player-list-items" id="player-list-items">
                    <span class="player-empty">加载中...</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 公告 -->
    <section class="page" id="page-notice">
        <div class="notice-layout">
            <aside class="notice-sidebar">
                <h3 class="sidebar-title">公告列表</h3>
                <nav class="sidebar-nav" id="notice-nav">
                </nav>
            </aside>
            <main class="notice-main" id="notice-main">
                <div class="notice-detail-empty">
                    <p>请从左侧选择公告查看</p>
                </div>
            </main>
        </div>
    </section>

    <!-- 奖励 -->
    <section class="page" id="page-reward">
        <div class="notice-layout">
            <aside class="notice-sidebar">
                <h3 class="sidebar-title">奖励月份</h3>
                <nav class="sidebar-nav" id="reward-nav">
                </nav>
            </aside>
            <main class="notice-main" id="reward-main">
                <div class="notice-detail-empty">
                    <p>请从左侧选择月份查看</p>
                </div>
            </main>
        </div>
    </section>

    <!-- 媒体 -->
    <section class="page" id="page-media">
        <div class="page-content">
            <h2 class="page-title">媒体</h2>
            <div class="media-links">
                <div class="media-item">
                    <p class="media-label">微信公众号</p>
                    <img src="wechat-qrcode.png" alt="火教公众号二维码" class="media-qrcode" />
                </div>
                <div class="media-item">
                    <p class="media-label">哔哩哔哩</p>
                    <a href="https://space.bilibili.com/3546599917620078" target="_blank" rel="noopener noreferrer" class="media-bilibili-btn">前往 Bilibili 主页</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        // ==================================================================
        // 公告数据 — 直接套用「火教」微信公众号每一条文章内容
        // 公众号有新文章时，在下面数组中追加即可（title/date/content 保持原文格式）
        // ==================================================================
        var notices = [
            {
                id: 8,
                title: '祝贺烧饼生存服务器建服一周年',
                date: '2026-06-20',
                content: '<p>值烧饼生存服务器开服一周年之际，火教集团附属服务器全体玩家与管理特此送上热烈祝贺！</p>' +
                    '<p>听闻烧饼服全体玩家合力完成蘑菇岛周年纪念碑、海西村纪念碑、杂烩集团驻服交流馆、烧饼地铁四五号线一期以及广场周年蛋糕五大周年献礼工程，我们由衷为烧饼服取得的成果感到欣喜，祝愿烧饼生存服务器往后长久平稳运营，玩家络绎不绝，持续打造更多精彩建筑，火教集团附属服务器也期待日后与烧饼服多多开展跨服联动，携手共创更好的游戏游玩氛围！</p>'
            },
            {
                id: 7,
                title: '火教集团附属服务器整合包更新日志',
                date: '2026-06-14',
                content: '<h3>V3.4.0</h3>' +
                    '<p>添加了Axiom，方便建造</p>' +
                    '<p>修复没有服务器自定义资源的问题</p>' +
                    '<p>添加了一个光影</p>' +
                    '<p>在Minecraft标题屏幕做了一些奇葩的更改</p>' +
                    '<p>更新了全部模组</p>'
            },
            {
                id: 6,
                title: '关于5月4日事件的处理公告',
                date: '2026-05-05',
                content: '<p>5月4日事件过后，根据恶劣程度添加3人进入永久黑名单，因为法律问题，请在群公告查看。</p>'
            },
            {
                id: 5,
                title: '烧饼小队和火教集团停战协定签署',
                date: '2026-05-04',
                content: '<p>一、烧饼小队和火教集团互相承认对方对其服务器合法的绝对领导，停止一切意图颠覆对方领导的行为；</p>' +
                    '<p>二、烧饼小队和火教集团互相尊重，停止谩骂，建立外交关系；</p>' +
                    '<p>三、烧饼小队和火教集团允许其成员和服务器成员加入对方组织和对方服务器；</p>' +
                    '<p>四、解散火教中央政府，允许双方成员和服务器成员加入火教中央政府革命委员会，将其打造为一个中立的，不领导任何服务器、不干涉任何服务器的和平统一战线组织；</p>' +
                    '<p>五、烧饼小队和火教集团的成员和服务器成员有义务遵循本协定之规定，并按照本协定约束自己的言论和行为；</p>' +
                    '<p>六、对于违背本协定原则和精神的历史文献和资料，不得修改，必要时可以引用其原文，不受本协定影响。</p>'
            },
            {
                id: 4,
                title: '火城虚拟地铁13号线一期竣工',
                date: '2026-04-26',
                content: '<p>火城地铁13号线一期2026年4月19日竣工，4月26日拍摄了POV。</p>' +
                    '<p><a href="https://b23.tv/w7XKSWy" target="_blank" rel="noopener noreferrer">观看POV视频 →</a></p>'
            },
            {
                id: 3,
                title: '玩家BLSDXZ成为服务器3月最佳玩家',
                date: '2026-04-08',
                content: '<p>玩家Blsdxz成为服务器3月上线时间最长和最佳玩家，服主已经对其进行了相应的奖励，并表示祝贺，希望各位玩家继续努力建设。</p>'
            },
            {
                id: 2,
                title: '石村游乐园站站房整体建成',
                date: '2026-04-07',
                content: '<p>4月6日，火城地铁13号线石村游乐园站站房整体建成，之后会对站内进行装修，石村游乐园站是13号线一期最后一座车站，建成后13号线会正式开通。</p>'
            },
            {
                id: 1,
                title: '庆祝火教公众号正式创立',
                date: '2026-04-06',
                content: '<p>2026年4月6日，火教集团公众号创立</p>'
            }
        ];

        var activeNoticeId = null;

        function renderNoticeSidebar() {
            var nav = document.getElementById('notice-nav');
            var html = '';
            for (var i = 0; i < notices.length; i++) {
                var n = notices[i];
                var cls = (activeNoticeId === n.id) ? ' sidebar-link active' : 'sidebar-link';
                html += '<a href="#" class="' + cls + '" data-id="' + n.id + '">' +
                    '<span class="sidebar-link-title">' + n.title + '</span>' +
                    '<span class="sidebar-link-date">' + n.date + '</span>' +
                    '</a>';
            }
            nav.innerHTML = html;

            nav.onclick = function(e) {
                e.preventDefault();
                var link = e.target.closest('.sidebar-link');
                if (!link) return;
                var id = parseInt(link.getAttribute('data-id'));
                showNoticeDetail(id);
            };
        }

        function showNoticeDetail(id) {
            var notice = null;
            for (var i = 0; i < notices.length; i++) {
                if (notices[i].id === id) { notice = notices[i]; break; }
            }
            if (!notice) return;

            activeNoticeId = id;
            var links = document.querySelectorAll('.sidebar-link');
            for (var j = 0; j < links.length; j++) {
                links[j].classList.remove('active');
            }
            var activeLink = document.querySelector('.sidebar-link[data-id="' + id + '"]');
            if (activeLink) activeLink.classList.add('active');

            var main = document.getElementById('notice-main');
            main.innerHTML =
                '<article class="notice-detail">' +
                '<h2 class="notice-detail-title">' + notice.title + '</h2>' +
                '<time class="notice-detail-date">' + notice.date + '</time>' +
                '<div class="notice-detail-body">' + notice.content + '</div>' +
                '</article>';
        }

        // ==================================================================
        // 奖励数据 — 每月最佳玩家
        // ==================================================================
        var rewards = [
            {
                id: 4,
                month: '2026年5月',
                items: [
                    { title: '最佳玩家', desc: '综合表现最优', player: 'li2012China', skin: 'skin-li2012china.png' },
                    { title: '上线时间最长', desc: '全服在线时长第一', player: 'li2012China', skin: 'skin-li2012china.png' },
                    { title: '特殊贡献', desc: '帮助制作服务器官网', player: 'li2012China', skin: 'skin-li2012china.png' }
                ]
            },
            {
                id: 3,
                month: '2026年4月',
                items: [
                    { title: '最佳玩家', desc: '综合表现最优', player: 'nitiaoxinwo', skin: 'skin-nitiaoxinwo.png' },
                    { title: '上线时间最长', desc: '全服在线时长第一', player: 'nitiaoxinwo', skin: 'skin-nitiaoxinwo.png' }
                ]
            },
            {
                id: 2,
                month: '2026年3月',
                items: [
                    { title: '最佳玩家', desc: '综合表现最优', player: 'Blsdxz', skin: 'skin-blsdxz.png' },
                    { title: '上线时间最长', desc: '全服在线时长第一', player: 'Blsdxz', skin: 'skin-blsdxz.png' }
                ]
            },
            {
                id: 1,
                month: '2026年2月',
                items: [
                    { title: '特殊贡献', desc: '服主开启了新的存档', player: 'tiebai', skin: 'skin-tiebai.png' }
                ]
            }
        ];

        var activeRewardId = null;

        function renderRewardSidebar() {
            var nav = document.getElementById('reward-nav');
            var html = '';
            for (var i = 0; i < rewards.length; i++) {
                var r = rewards[i];
                var cls = (activeRewardId === r.id) ? ' sidebar-link active' : 'sidebar-link';
                html += '<a href="#" class="' + cls + '" data-id="' + r.id + '">' +
                    '<span class="sidebar-link-title">' + r.month + '</span>' +
                    '</a>';
            }
            nav.innerHTML = html;

            nav.onclick = function(e) {
                e.preventDefault();
                var link = e.target.closest('.sidebar-link');
                if (!link) return;
                var id = parseInt(link.getAttribute('data-id'));
                showRewardDetail(id);
            };
        }

        function showRewardDetail(id) {
            var reward = null;
            for (var i = 0; i < rewards.length; i++) {
                if (rewards[i].id === id) { reward = rewards[i]; break; }
            }
            if (!reward) return;

            activeRewardId = id;
            var links = document.querySelectorAll('#reward-nav .sidebar-link');
            for (var j = 0; j < links.length; j++) {
                links[j].classList.remove('active');
            }
            var activeLink = document.querySelector('#reward-nav .sidebar-link[data-id="' + id + '"]');
            if (activeLink) activeLink.classList.add('active');

            var main = document.getElementById('reward-main');
            var itemsHtml = '';
            for (var k = 0; k < reward.items.length; k++) {
                var item = reward.items[k];
                var p = item.player || reward.player || '';
                var s = item.skin || reward.skin || '';
                itemsHtml +=
                    '<div class="reward-item">' +
                    '<h3 class="reward-item-title">' + item.title + '</h3>' +
                    (p ? '<p class="reward-item-player">' + p + '</p>' : '') +
                    '<p class="reward-item-desc">' + item.desc + '</p>' +
                    (s ? '<div class="reward-skin-preview"><img src="' + s + '" alt="' + p + ' 皮肤3D预览" class="reward-skin-img" /></div>' : '') +
                    '</div>';
            }
            main.innerHTML =
                '<article class="notice-detail">' +
                '<h2 class="notice-detail-title">' + reward.month + ' 奖励</h2>' +
                '<div class="reward-items-grid">' + itemsHtml + '</div>' +
                '</article>';
        }

        // ===== 页面切换 =====
        function switchPage(pageName) {
            var pages = document.querySelectorAll('.page');
            for (var i = 0; i < pages.length; i++) { pages[i].classList.remove('active'); }
            var navLinks = document.querySelectorAll('.nav a');
            for (var j = 0; j < navLinks.length; j++) { navLinks[j].classList.remove('active'); }

            var targetPage = document.getElementById('page-' + pageName);
            if (targetPage) { targetPage.classList.add('active'); targetPage.scrollTop = 0; }

            var targetNav = document.querySelector('.nav a[data-page="' + pageName + '"]');
            if (targetNav) targetNav.classList.add('active');

            if (pageName === 'notice') {
                document.getElementById('notice-nav').scrollTop = 0;
                document.getElementById('notice-main').scrollTop = 0;
                if (notices.length > 0) {
                    showNoticeDetail(notices[0].id);
                }
            }
            if (pageName === 'reward') {
                document.getElementById('reward-nav').scrollTop = 0;
                document.getElementById('reward-main').scrollTop = 0;
                if (rewards.length > 0) {
                    showRewardDetail(rewards[0].id);
                }
            }
        }

        document.getElementById('nav').addEventListener('click', function(e) {
            e.preventDefault();
            var page = e.target.getAttribute('data-page');
            if (page) switchPage(page);
        });

        // ===== 服务器状态 =====
        var STAT_CACHE_KEY = 'huojiao_server_cache';
        var statCache = null;
        try {
            var cached = localStorage.getItem(STAT_CACHE_KEY);
            if (cached) statCache = JSON.parse(cached);
        } catch (e) {}

        function fetchServerStatus() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'https://motdbe.blackbe.work/api/java?host=play.simpfun.cn:31313', true);
            xhr.timeout = 8000;
            xhr.onload = function() {
                try {
                    var data = JSON.parse(xhr.responseText);
                    if (data.status === 'online') {
                        localStorage.setItem(STAT_CACHE_KEY, JSON.stringify(data));
                        updateStatus(true, data);
                    } else {
                        fallbackOrOffline();
                    }
                } catch (e) {
                    fallbackOrOffline();
                }
            };
            xhr.onerror = function() { fallbackOrOffline(); };
            xhr.ontimeout = function() { fallbackOrOffline(); };
            xhr.send();
        }

        function fallbackOrOffline() {
            if (statCache) {
                updateStatus(true, statCache);
            } else {
                updateStatus(false);
            }
        }

        function updateStatus(online, data) {
            data = data || null;
            var heroStatus = document.getElementById('hero-status');
            var statusLabel = document.getElementById('status-label');
            var playerListItems = document.getElementById('player-list-items');

            if (online && data) {
                if (data.favicon) {
                    var headerLogo = document.getElementById('header-logo');
                    var favicon = document.getElementById('favicon');
                    if (headerLogo) headerLogo.src = data.favicon;
                    if (favicon) favicon.href = data.favicon;
                }
                heroStatus.querySelector('.status-dot').className = 'status-dot online';
                statusLabel.textContent = '服务器在线';
                document.getElementById('server-internal-tip').style.display = 'block'; // no-op, always shown
                document.getElementById('hero-players').textContent = data.online || '--';
                document.getElementById('hero-ping').textContent = (typeof data.delay !== 'undefined') ? data.delay : '--';

                var playerList = [];
                // 兼容两种 API 格式：顶层 sample 或 data.players.sample
                if (data.sample && data.sample.length) {
                    playerList = data.sample;
                } else if (data.players) {
                    if (data.players.sample && data.players.sample.length) {
                        playerList = data.players.sample;
                    } else if (data.players.list && data.players.list.length) {
                        playerList = data.players.list;
                    }
                }
                var delay = (typeof data.delay !== 'undefined') ? data.delay : null;
                if (playerList.length > 0) {
                    var listHtml = '';
                    for (var i = 0; i < playerList.length; i++) {
                        var p = playerList[i];
                        var pname = p.name || p;
                        listHtml +=
                            '<div class="player-card">' +
                            '<img class="player-card-avatar" src="https://minotar.net/avatar/' + encodeURIComponent(pname) + '/80" alt="' + pname + '" loading="lazy" onerror="this.src=\'https://visage.surgeplay.com/face/80/' + encodeURIComponent(pname) + '\'" />' +
                            '<div class="player-card-info">' +
                            '<span class="player-card-name">' + pname + '</span>' +
                            (delay != null ? '<span class="player-card-ping">' + delay + ' ms</span>' : '') +
                            '</div>' +
                            '</div>';
                    }
                    playerListItems.innerHTML = listHtml;
                } else if (data.online > 0) {
                    playerListItems.innerHTML = '<span class="player-empty">' + data.online + ' 名玩家在线</span>';
                } else {
                    playerListItems.innerHTML = '<span class="player-empty">暂无在线玩家</span>';
                }
            } else {
                heroStatus.querySelector('.status-dot').className = 'status-dot offline';
                statusLabel.textContent = '服务器离线';
                document.getElementById('server-internal-tip').style.display = 'block';
                document.getElementById('hero-players').textContent = '--';
                document.getElementById('hero-ping').textContent = '--';
                playerListItems.innerHTML = '<span class="player-empty">服务器离线</span>';
            }
        }

        // ===== 初始化 =====
        renderNoticeSidebar();
        renderRewardSidebar();
        updateStatus(false);
        fetchServerStatus();
        setInterval(fetchServerStatus, 10000);
    </script>
</body>
</html>
