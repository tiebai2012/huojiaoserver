<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火教集团附属服务器</title>
    <meta name="description" content="火教集团附属服务器" />
    <link rel="icon" id="favicon" type="image/png" href="">
    <link rel="stylesheet" href="style.css">
    <style>
        .countdown-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .countdown-block {
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
        }
        .countdown-left {
            display: inline-block;
            white-space: nowrap;
        }
        /* 关键修改：标签横向排列 */
        .countdown-label,
        .countdown-sheng {
            display: inline;
            margin: 0 4px;
        }
        /* 添加分隔竖线 */
        .countdown-sheng::before {
            content: "|";
            margin-right: 6px;
        }
        .countdown-digits {
            display: inline-block;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="" alt="Logo" class="server-logo" id="header-logo" />
                <span class="logo-text">火教集团附属服务器</span>
            </div>
            <nav class="nav" id="nav">
                <a href="#" data-page="home" class="active">首页</a>
                <a href="#" data-page="reward">奖励</a>
                <a href="#" data-page="players">玩家</a>
                <a href="#" data-page="notice">公告</a>
                <a href="#" data-page="media">媒体</a>
            </nav>
        </div>
    </header>

    <!-- 首页 -->
    <section class="page active" id="page-home">
        <div class="page-content">
            <div class="countdown-wrapper">
                <!-- 第一个倒计时：单独一行 -->
                <div class="countdown-block">
                    <div class="countdown-left">
                        <span class="countdown-label">距期末考试开始</span>
                        <span class="countdown-sheng">还剩</span>
                    </div>
                    <div class="countdown-digits" id="cd-exam">
                        <span class="cd-d">0</span><span class="cd-unit">天</span>
                        <span class="cd-h">0</span><span class="cd-unit">时</span>
                        <span class="cd-m">0</span><span class="cd-unit">分</span>
                        <span class="cd-s">0</span><span class="cd-unit">秒</span>
                    </div>
                </div>
                <!-- 第二个倒计时：单独一行 -->
                <div class="countdown-block">
                    <div class="countdown-left">
                        <span class="countdown-label">距暑假开始</span>
                        <span class="countdown-sheng">还剩</span>
                    </div>
                    <div class="countdown-digits" id="cd-summer">
                        <span class="cd-d">0</span><span class="cd-unit">天</span>
                        <span class="cd-h">0</span><span class="cd-unit">时</span>
                        <span class="cd-m">0</span><span class="cd-unit">分</span>
                        <span class="cd-s">0</span><span class="cd-unit">秒</span>
                    </div>
                </div>
            </div>
            <h1>火教集团附属服务器</h1>
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-value" id="hero-players">--</span>
                    <span class="stat-label">在线玩家</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value" id="hero-ping">--</span>
                    <span class="stat-label">延迟 (ms)</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value">1.20.1</span>
                    <span class="stat-label">游戏版本</span>
                </div>
            </div>
            <div class="hero-status" id="hero-status">
                <span class="status-dot"></span>
                <span id="status-label">正在获取状态...</span>
            </div>
            <p class="server-internal-tip" id="server-internal-tip" style="display:block;">服务器只对内部开放</p>
            <div class="player-list" id="player-list">
                <h3 class="player-list-title">在线玩家列表</h3>
                <div class="player-list-items" id="player-list-items">
                    <span class="player-empty">加载中...</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 玩家 -->
    <section class="page" id="page-players">
        <div class="page-content">
            <h2 class="page-title">玩家</h2>
            <div class="player-cards">
                <div class="player-profile-card">
                    <img class="player-profile-skin" src="https://visage.surg
